services:
  postgres:
    image: postgres:16-alpine
    container_name: my-chat-postgres-local
    environment:
      POSTGRES_DB: chat_service
      POSTGRES_USER: chat_service
      POSTGRES_PASSWORD: chat_service
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_service -d chat_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  main-service:
    build:
      context: ../../
      dockerfile: prod.Dockerfile
    container_name: my-chat-main-service-local
    command: ["./main-service", "-config", "configs/config.main-service.local.example.yaml"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
